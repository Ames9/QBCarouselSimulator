<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect QB Carousel Challenge 2026</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-card2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #0d1117 0%, #1a1f35 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 20px;
      text-align: center;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e6edf3 30%, #58a6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .container { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

    /* ── Layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── QB Cards ── */
    .qb-list { display: flex; flex-direction: column; gap: 10px; }
    .qb-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .qb-card.assigned { border-color: var(--green); }
    .qb-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .qb-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem; flex-shrink: 0;
    }
    .qb-info { flex: 1; }
    .qb-name { font-weight: 700; font-size: 0.95rem; }
    .qb-from { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .assigned-badge {
      font-size: 0.75rem; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
      background: rgba(63,185,80,0.15); color: var(--green);
      white-space: nowrap;
    }
    .team-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip {
      padding: 5px 10px; border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text);
      cursor: pointer; font-size: 0.78rem; font-weight: 700;
      transition: all 0.15s; font-family: inherit;
    }
    .chip:hover:not(.taken) {
      border-color: var(--accent); background: rgba(88,166,255,0.08);
    }
    .chip.selected {
      border-color: var(--green); background: rgba(63,185,80,0.15); color: var(--green);
    }
    .chip.taken { opacity: 0.45; }
    .chip.other-chip {
      border-style: dashed; border-color: var(--yellow); color: var(--yellow);
    }
    .chip.other-chip:hover { background: rgba(210,153,34,0.12); }
    .chip.other-chip.selected { background: rgba(210,153,34,0.2); border-style: solid; }
    .other-select-row {
      display: none; margin-top: 6px; gap: 8px; align-items: center;
    }
    .other-select-row.show { display: flex; flex-wrap: wrap; }
    .styled-select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 7px;
      font-size: 0.82rem; font-family: inherit; cursor: pointer;
    }
    .styled-select:focus { outline: none; border-color: var(--accent); }

    /* ── Team Grid ── */
    .team-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .team-card {
      border-radius: 12px; padding: 14px 16px;
      border: 2px solid transparent;
      min-height: 90px;
      display: flex; flex-direction: column;
      transition: opacity 0.2s;
    }
    .team-card.has-qb { border-width: 2px; }
    .team-abbr { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.5px; }
    .team-full { font-size: 0.68rem; opacity: 0.65; margin-bottom: 6px; }
    .team-qb-name {
      margin-top: auto; font-size: 0.85rem; font-weight: 600;
    }
    .team-empty-label {
      margin-top: auto; font-size: 0.75rem; color: var(--muted); font-style: italic;
    }

    /* ── Unassigned Teams ── */
    .section-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    }
    .unassigned-list { display: flex; flex-direction: column; gap: 8px; }
    .unassigned-row {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 14px; border-radius: 9px;
      background: var(--bg-card2); flex-wrap: wrap;
    }
    .una-team {
      font-weight: 800; font-size: 0.9rem; min-width: 44px;
    }
    .una-team-full { font-size: 0.72rem; color: var(--muted); min-width: 120px; }
    .radio-group { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .radio-label {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 0.85rem; user-select: none;
    }
    .radio-label input[type=radio] { accent-color: var(--accent); cursor: pointer; }
    .fa-select-wrap { display: none; }
    .fa-select-wrap.show { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .fa-info { font-size: 0.72rem; color: var(--muted); }
    .prob-pill {
      display: inline-block; padding: 2px 6px; border-radius: 5px;
      font-size: 0.7rem; font-weight: 700;
    }
    .prob-high { background: rgba(63,185,80,0.2); color: var(--green); }
    .prob-mid { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .prob-low { background: rgba(248,81,73,0.2); color: var(--red); }

    /* ── Summary ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .summary-card {
      background: var(--bg-card2); border-radius: 10px; padding: 12px 14px;
      border: 1px solid var(--border);
    }
    .summary-team { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .summary-qb { font-weight: 700; font-size: 0.95rem; margin-top: 2px; }
    .summary-tag {
      font-size: 0.68rem; padding: 2px 6px; border-radius: 4px;
      margin-top: 4px; display: inline-block;
    }
    .tag-main { background: rgba(88,166,255,0.15); color: var(--accent); }
    .tag-fa { background: rgba(188,140,255,0.15); color: var(--purple); }
    .tag-none { background: rgba(139,148,158,0.12); color: var(--muted); }

    /* Buttons */
    .btn {
      padding: 8px 18px; border-radius: 8px; border: none;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #79c0ff; }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { background: var(--bg-card2); }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .reset-link {
      color: var(--red); font-size: 0.8rem; background: none; border: none;
      cursor: pointer; font-family: inherit; text-decoration: underline;
    }
    .empty-summary {
      color: var(--muted); font-size: 0.85rem; font-style: italic;
      text-align: center; padding: 20px 0;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--green); color: #000; padding: 10px 20px; border-radius: 8px;
      font-weight: 600; font-size: 0.85rem;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .name-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<header>
  <h1>🏈 Perfect QB Carousel Challenge 2026</h1>
  <p class="subtitle">NFLオフシーズン QB移籍シミュレーター ─ あなたの予想を入力しよう</p>
</header>

<div class="container">
  <!-- Main Grid -->
  <div class="main-grid">
    <!-- QB Panel -->
    <div>
      <div class="panel-title">メインQB ─ 移籍先を選択</div>
      <div class="qb-list" id="qb-list"></div>
    </div>
    <!-- Teams Panel -->
    <div id="teams-panel">
      <div class="panel-title">チーム状況</div>
      <div class="team-grid" id="team-grid"></div>
    </div>
  </div>

  <!-- Unassigned Teams -->
  <div class="section-box" id="unassigned-section">
    <div class="panel-title">空きチーム ─ 動かない or FA補強を選択</div>
    <div class="unassigned-list" id="unassigned-list">
      <p style="color:var(--muted);font-size:0.85rem;font-style:italic;">QBを割り当てていくと、余ったチームがここに表示されます。</p>
    </div>
  </div>

  <!-- Summary -->
  <div class="section-box">
    <div class="panel-title">予想まとめ</div>
    <div class="summary-grid" id="summary-grid">
      <p class="empty-summary">QBを割り当てるとここに結果が表示されます</p>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyResult()">📋 テキストコピー</button>
      <button class="btn btn-ghost" onclick="resetAll()">リセット</button>
    </div>
  </div>

  <!-- Download -->
  <div class="section-box">
    <div class="panel-title">画像ダウンロード</div>
    <div class="name-row">
      <input type="text" id="username-input" class="styled-select"
        placeholder="ハンドルネーム（任意）"
        style="min-width:180px;flex:1;max-width:260px;">
      <button class="btn btn-ghost" onclick="downloadImage()">📷 チーム状況を画像DL</button>
    </div>
  </div>
</div>

<footer style="text-align:center;padding:16px;font-size:0.72rem;color:var(--muted);border-top:1px solid var(--border);margin-top:8px;">
  Built by Ames and Claude Code (2026.03.09)
</footer>

<div class="toast" id="toast"></div>

<script>

const FEATURED_TEAMS = ['LVR', 'NYJ', 'ARI', 'MIA', 'ATL', 'CLE', 'PIT', 'MIN'];

const ALL_NFL_TEAMS = [
  'ARI','ATL','BAL','BUF','CAR','CHI','CIN','CLE',
  'DAL','DEN','DET','GB','HOU','IND','JAX','KC',
  'LAC','LAR','LVR','MIA','MIN','NE','NO','NYG',
  'NYJ','PHI','PIT','SEA','SF','TB','TEN','WSH',
];

// Trade candidates
const TRADE_PLAYERS = ['Mac Jones', 'Derek Carr', 'Tanner McKee', 'Spencer Rattler', 'Justin Fields'];

// FA QBs list
const FA_QBS = [
  { name: 'Geno Smith',         lastTeam: 'SEA', status: 'UFA',  prob: 35.0, age: 35, salary:  5000000 },
  { name: 'Russell Wilson',     lastTeam: 'NYG', status: 'UFA',  prob: 19.1, age: 38, salary: 10500000 },
  { name: 'Marcus Mariota',     lastTeam: 'WSH', status: 'UFA',  prob: 48.4, age: 33, salary:  8000000 },
  { name: 'Tyrod Taylor',       lastTeam: 'NYJ', status: 'UFA',  prob: 24.0, age: 37, salary:  6000000 },
  { name: 'Zach Wilson',        lastTeam: 'MIA', status: 'UFA',  prob:  2.6, age: 27, salary:  6000000 },
  { name: 'Joe Flacco',         lastTeam: 'CIN', status: 'Void', prob: 62.7, age: 41, salary:  4250000 },

  { name: 'Jimmy Garoppolo',    lastTeam: 'LAR', status: 'UFA',  prob:  1.6, age: 35, salary:  3005000 },
  { name: 'Mitchell Trubisky',  lastTeam: 'BUF', status: 'UFA',  prob:  8.7, age: 32, salary:  2625000 },
  { name: 'Case Keenum',        lastTeam: 'CHI', status: 'UFA',  prob:  0.0, age: 38, salary:  2250000 },
  { name: 'Trey Lance',         lastTeam: 'LAC', status: 'UFA',  prob:  8.7, age: 26, salary:  2000000 },

  { name: 'Teddy Bridgewater',  lastTeam: 'TB',  status: 'UFA',  prob:  3.1, age: 34, salary:  1255000 },
  { name: 'Sam Ehlinger',       lastTeam: 'DEN', status: 'UFA',  prob:  0.0, age: 28, salary:  1170000 },
  { name: 'Gardner Minshew',    lastTeam: 'KC',  status: 'UFA',  prob:  3.7, age: 30, salary:  1170000 },
  { name: 'Tyler Huntley',      lastTeam: 'BAL', status: 'UFA',  prob: 19.4, age: 28, salary:  1170000 },
  { name: 'Skylar Thompson',    lastTeam: 'PIT', status: 'UFA',  prob:  0.0, age: 29, salary:  1100000 },
  { name: 'Clayton Tune',       lastTeam: 'GB',  status: 'SFA',  prob:  5.6, age: 27, salary:  1087500 },
  { name: 'Sam Howell',         lastTeam: 'PHI', status: 'UFA',  prob:  0.0, age: 26, salary:  1005400 },
  { name: 'Jake Browning',      lastTeam: 'CIN', status: 'RFA',  prob: 19.1, age: 30, salary:   972500 },
  { name: 'Hendon Hooker',      lastTeam: 'NYJ', status: 'ERFA', prob:  0.0, age: 28, salary:  1030000 },
  { name: 'Tommy DeVito',       lastTeam: 'NE',  status: 'Signed',prob: 0.0, age: 28, salary:  2200000 },
];

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
const state = {
  qbTeam: {},         // qbId → teamAbbr | 'other' | null
  qbOtherTeam: {},    // qbId → teamAbbr when 'other'
  teamChoice: {},     // teamAbbr → 'nokotae' | 'fa' | 'trade' | null
  teamFa: {},         // teamAbbr → FA QB name | '__custom__'
  teamFaCustom: {},   // teamAbbr → custom FA name
  teamTrade: {},      // teamAbbr → player name | '__custom__'
  teamTradeCustom: {},// teamAbbr → custom trade player name
};

MAIN_QBS.forEach(q => { state.qbTeam[q.id] = null; state.qbOtherTeam[q.id] = null; });
FEATURED_TEAMS.forEach(t => {
  state.teamChoice[t] = null; state.teamFa[t] = null; state.teamFaCustom[t] = null;
  state.teamTrade[t] = null;  state.teamTradeCustom[t] = null;
});

// ──────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────
function getAssignedFeaturedTeams() {
  const result = {};
  MAIN_QBS.forEach(q => {
    const t = state.qbTeam[q.id];
    if (t && FEATURED_TEAMS.includes(t)) result[t] = q;
  });
  return result;
}

function getUnassignedFeaturedTeams() {
  const assigned = getAssignedFeaturedTeams();
  return FEATURED_TEAMS.filter(t => !assigned[t]);
}

function isTeamTaken(teamAbbr) {
  for (const q of MAIN_QBS) {
    if (state.qbTeam[q.id] === teamAbbr) return q;
  }
  return null;
}

function fmtSalary(n) {
  if (n >= 1000000) return `$${(n/1000000).toFixed(1)}M`;
  return `$${(n/1000).toFixed(0)}K`;
}

function probClass(p) {
  if (p >= 40) return 'prob-high';
  if (p >= 15) return 'prob-mid';
  return 'prob-low';
}

// Returns white for dark secondary colors, else the color itself
function cardTextColor(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (0.299*r + 0.587*g + 0.114*b) < 100 ? '#FFFFFF' : hex;
}

// For badge backgrounds: return white or black text based on bg luminance
function bgToTextColor(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (0.299*r + 0.587*g + 0.114*b) < 128 ? '#FFFFFF' : '#000000';
}

// ──────────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────────
function render() {
  renderQBList();
  renderTeamGrid();
  renderUnassigned();
  renderSummary();
}

function renderQBList() {
  const container = document.getElementById('qb-list');
  container.innerHTML = '';

  MAIN_QBS.forEach((qb, idx) => {
    const av = QB_AVATARS[idx];
    const selected = state.qbTeam[qb.id];
    const isAssigned = selected !== null;
    const isOther = selected === 'other';
    const otherVal = state.qbOtherTeam[qb.id];

    const card = document.createElement('div');
    card.className = 'qb-card' + (isAssigned ? ' assigned' : '');
    card.innerHTML = `
      <div class="qb-header">
        <div class="qb-avatar" style="background:${av.bg};color:${av.text}">${qb.initials}</div>
        <div class="qb-info">
          <div class="qb-name">${qb.name}</div>
          <div class="qb-from">前所属: ${qb.from}</div>
        </div>
        ${isAssigned && !isOther ? `<div class="assigned-badge">→ ${selected}</div>` : ''}
        ${isOther && otherVal ? `<div class="assigned-badge" style="background:rgba(210,153,34,0.15);color:var(--yellow);">その他: ${otherVal}</div>` : ''}
      </div>
      <div class="team-chips">
        ${FEATURED_TEAMS.map(t => {
          const isSelf = state.qbTeam[qb.id] === t;
          const othersTaking = MAIN_QBS.filter(q2 => q2.id !== qb.id && state.qbTeam[q2.id] === t);
          const isTaken = othersTaking.length > 0;
          const titleText = isTaken
            ? (isSelf ? '自分も選択中 / ' : '') + othersTaking.map(q2 => q2.name).join('、') + 'も選択中'
            : TEAM_INFO[t].full;
          return `<button
            class="chip${isSelf ? ' selected' : ''}${isTaken ? ' taken' : ''}"
            title="${titleText}"
            onclick="selectQBTeam('${qb.id}', '${t}')"
          >${t}</button>`;
        }).join('')}
        <button
          class="chip other-chip${isOther ? ' selected' : ''}"
          onclick="selectQBTeam('${qb.id}', 'other')"
          title="その他：メイン8チーム以外を選択"
        >その他 ▾</button>
      </div>
      <div class="other-select-row ${isOther ? 'show' : ''}" id="other-row-${qb.id}">
        <select class="styled-select" onchange="setOtherTeam('${qb.id}', this.value)">
          <option value="">─ チームを選択 ─</option>
          ${ALL_NFL_TEAMS
            .filter(t => !FEATURED_TEAMS.includes(t))
            .map(t => `<option value="${t}" ${otherVal === t ? 'selected' : ''}>${t}</option>`)
            .join('')}
        </select>
        ${isOther && !otherVal ? '<span style="font-size:0.75rem;color:var(--yellow);">↑ チームを選んでください</span>' : ''}
      </div>
    `;
    container.appendChild(card);
  });
}

function makeTeamCard(abbr, qbLabel, qbStyle, borderColor, container) {
  const info = TEAM_INFO[abbr] || { full: abbr, primary: '#1c2128', secondary: '#58a6ff' };
  const txtColor = cardTextColor(info.secondary);
  const card = document.createElement('div');
  card.className = 'team-card' + (qbLabel ? ' has-qb' : '');
  card.style.cssText = `background: linear-gradient(135deg, ${info.primary}cc 0%, ${info.primary}88 100%);
    border-color: ${borderColor};`;
  card.innerHTML = `
    <div class="team-abbr" style="color:${txtColor}">${abbr}</div>
    <div class="team-full">${info.full}</div>
    ${qbLabel
      ? `<div class="team-qb-name" style="${qbStyle || `color:${txtColor}`}">${qbLabel}</div>`
      : `<div class="team-empty-label">空き</div>`
    }
  `;
  container.appendChild(card);
}

function renderTeamGrid() {
  const container = document.getElementById('team-grid');
  container.innerHTML = '';
  const assigned = getAssignedFeaturedTeams();

  // Featured 8 teams
  FEATURED_TEAMS.forEach(t => {
    const info = TEAM_INFO[t];
    const txtColor = cardTextColor(info.secondary);
    const mainQb = assigned[t];
    const choice = state.teamChoice[t];
    const faName = state.teamFa[t];

    let label = null, labelStyle = '', borderColor = 'transparent';

    if (mainQb) {
      label = mainQb.name;
      labelStyle = `color:${txtColor}`;
      borderColor = info.secondary;
    } else if (choice === 'fa') {
      const d = state.teamFa[t] === '__custom__' ? state.teamFaCustom[t] : state.teamFa[t];
      if (d) { label = d; labelStyle = `color:var(--purple)`; borderColor = '#bc8cff66'; }
    } else if (choice === 'trade') {
      const d = state.teamTrade[t] === '__custom__' ? state.teamTradeCustom[t] : state.teamTrade[t];
      if (d) { label = d; labelStyle = `color:var(--yellow)`; borderColor = '#d2992255'; }
    } else if (choice === 'nokotae') {
      label = '動かない';
      labelStyle = `color:var(--muted);font-style:italic`;
      borderColor = '#30363d';
    }

    makeTeamCard(t, label, labelStyle, borderColor, container);
  });

  // その他 teams selected by main QBs
  MAIN_QBS.forEach(q => {
    if (state.qbTeam[q.id] === 'other' && state.qbOtherTeam[q.id]) {
      const t = state.qbOtherTeam[q.id];
      const info = TEAM_INFO[t] || { secondary: '#58a6ff' };
      const txtColor = cardTextColor(info.secondary);
      makeTeamCard(t, q.name, `color:${txtColor}`, info.secondary, container);
    }
  });
}

function renderUnassigned() {
  const unassigned = getUnassignedFeaturedTeams();
  const container = document.getElementById('unassigned-list');

  if (unassigned.length === 0) {
    container.innerHTML = '<p style="color:var(--green);font-size:0.85rem;">✓ 全チームにQBが割り当てられています</p>';
    return;
  }

  container.innerHTML = '';
  unassigned.forEach(t => {
    const info = TEAM_INFO[t];
    const choice = state.teamChoice[t];
    const faVal = state.teamFa[t];
    const tradeVal = state.teamTrade[t];
    const badgeBg = info.primary;
    const badgeTxt = bgToTextColor(badgeBg);

    const row = document.createElement('div');
    row.className = 'unassigned-row';
    row.innerHTML = `
      <div class="una-team">
        <span style="background:${badgeBg};color:${badgeTxt};padding:4px 10px;border-radius:7px;display:inline-block;">${t}</span>
      </div>
      <div class="una-team-full">${info.full}</div>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="choice-${t}" value="nokotae"
            ${choice === 'nokotae' ? 'checked' : ''}
            onchange="setTeamChoice('${t}', 'nokotae')">
          動かない
        </label>
        <label class="radio-label">
          <input type="radio" name="choice-${t}" value="fa"
            ${choice === 'fa' ? 'checked' : ''}
            onchange="setTeamChoice('${t}', 'fa')">
          FA補強
        </label>
        <label class="radio-label">
          <input type="radio" name="choice-${t}" value="trade"
            ${choice === 'trade' ? 'checked' : ''}
            onchange="setTeamChoice('${t}', 'trade')">
          トレード
        </label>
      </div>
      <div class="fa-select-wrap ${choice === 'fa' ? 'show' : ''}" id="fa-wrap-${t}">
        <select class="styled-select" onchange="setTeamFa('${t}', this.value)">
          <option value="">─ FA QBを選択 ─</option>
          ${FA_QBS.map(fa => `<option value="${fa.name}" ${faVal === fa.name ? 'selected' : ''}>${fa.name} (${fa.lastTeam})</option>`).join('')}
          <option value="__custom__" ${faVal === '__custom__' ? 'selected' : ''}>その他（自由入力）</option>
        </select>
        ${faVal === '__custom__' ? `
          <input type="text" class="styled-select" placeholder="選手名を入力"
            value="${state.teamFaCustom[t] || ''}"
            oninput="setTeamFaCustom('${t}', this.value)"
            style="min-width:140px">
        ` : ''}
      </div>
      <div class="fa-select-wrap ${choice === 'trade' ? 'show' : ''}" id="trade-wrap-${t}">
        <select class="styled-select" onchange="setTeamTrade('${t}', this.value)">
          <option value="">─ 選手を選択 ─</option>
          ${TRADE_PLAYERS.map(p => `<option value="${p}" ${tradeVal === p ? 'selected' : ''}>${p}</option>`).join('')}
          <option value="__custom__" ${tradeVal === '__custom__' ? 'selected' : ''}>その他（自由入力）</option>
        </select>
        ${tradeVal === '__custom__' ? `
          <input type="text" class="styled-select" placeholder="選手名を入力"
            value="${state.teamTradeCustom[t] || ''}"
            oninput="setTeamTradeCustom('${t}', this.value)"
            style="min-width:140px">
        ` : ''}
      </div>
    `;
    container.appendChild(row);
  });
}

function renderSummary() {
  const container = document.getElementById('summary-grid');
  const assigned = getAssignedFeaturedTeams();
  const unassigned = getUnassignedFeaturedTeams();

  const cards = [];

  // Assigned featured teams
  FEATURED_TEAMS.forEach(t => {
    const qb = assigned[t];
    if (qb) {
      cards.push({ team: t, qb: qb.name, tag: 'main' });
    }
  });

  // Unassigned featured teams
  unassigned.forEach(t => {
    const choice = state.teamChoice[t];
    if (choice === 'nokotae') {
      cards.push({ team: t, qb: '動かない', tag: 'none' });
    } else if (choice === 'fa') {
      const name = state.teamFa[t] === '__custom__' ? state.teamFaCustom[t] : state.teamFa[t];
      if (name) cards.push({ team: t, qb: name, tag: 'fa' });
    } else if (choice === 'trade') {
      const name = state.teamTrade[t] === '__custom__' ? state.teamTradeCustom[t] : state.teamTrade[t];
      if (name) cards.push({ team: t, qb: name, tag: 'trade' });
    } else {
      return;
    }
  });

  // Other teams (その他)
  MAIN_QBS.forEach(q => {
    if (state.qbTeam[q.id] === 'other' && state.qbOtherTeam[q.id]) {
      cards.push({ team: state.qbOtherTeam[q.id], qb: q.name, tag: 'main', extra: 'その他' });
    }
  });

  if (cards.length === 0) {
    container.innerHTML = '<p class="empty-summary">QBを割り当てるとここに結果が表示されます</p>';
    return;
  }

  container.innerHTML = cards.map(c => {
    const tagLabel = c.tag === 'main' ? (c.extra ? 'その他' : 'メインQB')
                   : c.tag === 'fa' ? 'FA補強' : c.tag === 'trade' ? 'トレード' : '動かない';
    const tagClass = c.tag === 'main' ? (c.extra ? 'tag-fa' : 'tag-main')
                   : (c.tag === 'fa' || c.tag === 'trade') ? 'tag-fa' : 'tag-none';
    return `
      <div class="summary-card">
        <div class="summary-team">${c.team}</div>
        <div class="summary-qb">${c.qb}</div>
        <span class="summary-tag ${tagClass}">${tagLabel}</span>
      </div>
    `;
  }).join('');
}

// ──────────────────────────────────────────────
// EVENT HANDLERS
// ──────────────────────────────────────────────
function selectQBTeam(qbId, team) {
  // Toggle off
  if (state.qbTeam[qbId] === team) {
    state.qbTeam[qbId] = null;
    if (team === 'other') state.qbOtherTeam[qbId] = null;
  } else {
    state.qbTeam[qbId] = team;
    if (team !== 'other') state.qbOtherTeam[qbId] = null;
  }
  render();
}

function setOtherTeam(qbId, team) {
  state.qbOtherTeam[qbId] = team || null;
  render();
}

function setTeamChoice(team, choice) {
  state.teamChoice[team] = choice;
  if (choice !== 'fa')    { state.teamFa[team] = null; state.teamFaCustom[team] = null; }
  if (choice !== 'trade') { state.teamTrade[team] = null; state.teamTradeCustom[team] = null; }
  render();
}

function setTeamFa(team, name) {
  state.teamFa[team] = name || null;
  if (name !== '__custom__') state.teamFaCustom[team] = null;
  render();
}

function setTeamFaCustom(team, val) {
  state.teamFaCustom[team] = val || null;
  renderTeamGrid(); renderSummary();
}

function setTeamTrade(team, player) {
  state.teamTrade[team] = player || null;
  if (player !== '__custom__') state.teamTradeCustom[team] = null;
  render();
}

function setTeamTradeCustom(team, val) {
  state.teamTradeCustom[team] = val || null;
  renderTeamGrid(); renderSummary();
}

function resetAll() {
  MAIN_QBS.forEach(q => { state.qbTeam[q.id] = null; state.qbOtherTeam[q.id] = null; });
  FEATURED_TEAMS.forEach(t => {
    state.teamChoice[t] = null; state.teamFa[t] = null; state.teamFaCustom[t] = null;
    state.teamTrade[t] = null;  state.teamTradeCustom[t] = null;
  });
  render();
}

function copyResult() {
  const assigned = getAssignedFeaturedTeams();
  const unassigned = getUnassignedFeaturedTeams();

  const lines = ['🏈 Perfect QB Carousel Challenge 2026 ─ 私の予想', ''];

  lines.push('【メインQB移籍先】');
  FEATURED_TEAMS.forEach(t => {
    const qb = assigned[t];
    if (qb) lines.push(`  ${t} → ${qb.name}`);
  });
  MAIN_QBS.forEach(q => {
    if (state.qbTeam[q.id] === 'other' && state.qbOtherTeam[q.id]) {
      lines.push(`  ${state.qbOtherTeam[q.id]}（その他） → ${q.name}`);
    }
  });

  if (unassigned.length > 0) {
    lines.push('');
    lines.push('【空きチーム】');
    unassigned.forEach(t => {
      const choice = state.teamChoice[t];
      if (choice === 'nokotae') {
        lines.push(`  ${t}: 動かない`);
      } else if (choice === 'fa') {
        const n = state.teamFa[t] === '__custom__' ? state.teamFaCustom[t] : state.teamFa[t];
        lines.push(n ? `  ${t}: FA補強（${n}）` : `  ${t}: 未定`);
      } else if (choice === 'trade') {
        const n = state.teamTrade[t] === '__custom__' ? state.teamTradeCustom[t] : state.teamTrade[t];
        lines.push(n ? `  ${t}: トレード（${n}）` : `  ${t}: 未定`);
      } else {
        lines.push(`  ${t}: 未定`);
      }
    });
  }

  navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('📋 クリップボードにコピーしました！'));
}

// ──────────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ──────────────────────────────────────────────
// IMAGE DOWNLOAD
// ──────────────────────────────────────────────
async function downloadImage() {
  const username = document.getElementById('username-input').value.trim();
  const panel = document.getElementById('teams-panel');

  // Temporarily inject a header with username
  const header = document.createElement('div');
  header.id = '__dl_header__';
  header.style.cssText = 'padding:10px 0 14px;text-align:center;border-bottom:1px solid #30363d;margin-bottom:10px;';
  header.innerHTML = `
    <div style="font-size:1rem;font-weight:800;color:#e6edf3;letter-spacing:-0.3px;">🏈 Perfect QB Carousel Challenge 2026</div>
    ${username ? `<div style="font-size:0.8rem;color:#58a6ff;margin-top:3px;font-weight:600;">@${username}</div>` : ''}
  `;
  panel.insertBefore(header, panel.firstChild);

  try {
    const canvas = await html2canvas(panel, {
      scale: 2,
      backgroundColor: '#161b22',
      useCORS: true,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = `qb-carousel${username ? '-' + username : ''}-2026.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('📷 画像をダウンロードしました！');
  } catch(e) {
    showToast('❌ 画像生成に失敗しました');
  } finally {
    document.getElementById('__dl_header__')?.remove();
  }
}

// ──────────────────────────────────────────────
// (predictions feature removed)
// ──────────────────────────────────────────────
function buildCurrentCards() {
  const assigned = getAssignedFeaturedTeams();
  const unassigned = getUnassignedFeaturedTeams();
  const cards = [];

  FEATURED_TEAMS.forEach(t => {
    const qb = assigned[t];
    if (qb) cards.push({ team: t, qb: qb.name, tag: 'main' });
  });
  unassigned.forEach(t => {
    const choice = state.teamChoice[t];
    if (choice === 'nokotae') {
      cards.push({ team: t, qb: '動かない', tag: 'none' });
    } else if (choice === 'fa') {
      const n = state.teamFa[t] === '__custom__' ? state.teamFaCustom[t] : state.teamFa[t];
      if (n) cards.push({ team: t, qb: n, tag: 'fa' });
    } else if (choice === 'trade') {
      const n = state.teamTrade[t] === '__custom__' ? state.teamTradeCustom[t] : state.teamTrade[t];
      if (n) cards.push({ team: t, qb: n, tag: 'trade' });
    }
  });
  MAIN_QBS.forEach(q => {
    if (state.qbTeam[q.id] === 'other' && state.qbOtherTeam[q.id]) {
      cards.push({ team: state.qbOtherTeam[q.id], qb: q.name, tag: 'other' });
    }
  });
  return cards;
}

// Init
render();
</script>
